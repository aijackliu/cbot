    // === SVG 雷達圖元件 ===
    const RadarChart = ({ scores, shortModel, isMain }) => {
      const size = 260; 
      const center = size / 2;
      const radius = (size / 2) - 40;
      const metrics = ['AI能力', 'SDK開放度', '輕便度', '電池續航', '價格優勢', '舒適度'];
      const keys = ['ai', 'sdk', 'weight', 'battery', 'price', 'comfort'];
      
      const getCoordinatesForValue = (value, index) => {
        const angle = (Math.PI * 2 * index) / metrics.length - Math.PI / 2;
        const distance = (value / 10) * radius;
        return { x: center + distance * Math.cos(angle), y: center + distance * Math.sin(angle) };
      };

      const drawGrid = (level) => {
        let points = '';
        for (let i = 0; i < metrics.length; i++) {
          const coord = getCoordinatesForValue(level * 3.33, i);
          points += coord.x + "," + coord.y + " ";
        }
        return points;
      };

      let dataPoints = '';
      keys.forEach((key, i) => {
        const val = scores[key] || 0;
        const coord = getCoordinatesForValue(val, i);
        dataPoints += coord.x + "," + coord.y + " ";
      });

      const mainColor = isMain ? '#F59E0B' : '#3B82F6';
      const bgColor = isMain ? 'rgba(245, 158, 11, 0.2)' : 'rgba(59, 130, 246, 0.2)';

      return (
        <div className="flex flex-col items-center w-full">
          <div className="text-center mb-2 h-12 flex flex-col justify-end pb-1">
            <div className={"text-sm font-bold uppercase mb-1 " + (isMain ? "text-amber-600" : "text-slate-500")}>
              {isMain ? '核心目標' : '市場競品'}
            </div>
            <div className="text-base sm:text-lg font-bold text-slate-800 leading-tight px-2 break-words">
              {shortModel}
            </div>
          </div>
          <svg width={size} height={size} viewBox={"0 0 " + size + " " + size} className="max-w-full">
            {[1, 2, 3].map((level) => (
              <polygon key={level} points={drawGrid(level)} fill="none" stroke="#E2E8F0" strokeWidth="1" />
            ))}
            {metrics.map((_, i) => {
              const end = getCoordinatesForValue(10, i);
              return <line key={i} x1={center} y1={center} x2={end.x} y2={end.y} stroke="#E2E8F0" strokeWidth="1" />;
            })}
            <polygon points={dataPoints} fill={bgColor} stroke={mainColor} strokeWidth="2" strokeLinejoin="round" />
            {keys.map((key, i) => {
              const val = scores[key] || 0;
              const coord = getCoordinatesForValue(val, i);
              return <circle key={i} cx={coord.x} cy={coord.y} r="3" fill={mainColor} />;
            })}
            {metrics.map((metric, i) => {
              const coord = getCoordinatesForValue(12.5, i);
              return (
                <text key={i} x={coord.x} y={coord.y} fill="#475569" fontSize="14" textAnchor="middle" dominantBaseline="middle" className="font-semibold">
                  {metric}
                </text>
              );
            })}
          </svg>
        </div>
      );
    };
