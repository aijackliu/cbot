        const angle = (Math.PI * 2 * index) / metrics.length - Math.PI / 2;

          <svg width={size} height={size} viewBox={"0 0 " + size + " " + size} className="max-w-full" role="img" aria-label={shortModel + " 雷達圖"}>
            {[1, 2, 3].map((level) => (
              <polygon key={level} points={drawGrid(level)} fill="none" stroke="#E2E8F0" strokeWidth="1" />
            ))}
            {metrics.map((_, i) => {
              const end = getCoordinatesForValue(10, i);
              return <line key={i} x1={center} y1={center} x2={end.x} y2={end.y} stroke="#E2E8F0" strokeWidth="1" />;
            })}
            <polygon points={dataPoints} fill={bgColor} stroke={mainColor} strokeWidth="2.25" strokeLinejoin="round" />
            {keys.map((key, i) => {
              const val = scores[key] || 0;
              const coord = getCoordinatesForValue(val, i);
              return <circle key={i} cx={coord.x} cy={coord.y} r="3.5" fill={mainColor} stroke="#fff" strokeWidth="1.5" />;
            })}
            {metrics.map((metric, i) => {
              const coord = getCoordinatesForValue(12.5, i);

                <text key={i} x={coord.x} y={coord.y} fill="#64748B" fontSize="12" fontWeight="600" textAnchor="middle" dominantBaseline="middle">
                  {metric}

          </svg>
        </div>
      );
    };

      const [selectedIds, setSelectedIds] = useState(['noya', 'ergo', 'rokid', 'meta', 'vive', 'google', 'asus', 'rog', 'apple']);
      const [alertMsg, setAlertMsg] = useState('');
      
      const [quadrantX, setQuadrantX] = useState('priceNumeric');

      const [activePestelTab, setActivePestelTab] = useState('All');

      const [pestelLoadState, setPestelLoadState] = useState('loading');

      useEffect(() => {
        let cancelled = false;
        // 相對路徑：GitHub Pages 專案站 /user/repo/ 與根目錄站皆可
        const dataUrl = new URL('data/pestel-news.json', window.location.href).href;
        fetch(dataUrl)
          .then((res) => {
            if (!res.ok) throw new Error('load failed');
            return res.json();
          })
          .then((data) => {
            if (cancelled) return;
            const items = (data.items || [])
              .filter((item) => item.title && item.title.trim())
              .map(enrichPestelItem)
              .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
            setPestelNews(items);
            if (data.updatedAt) {
              const [y, m, d] = data.updatedAt.split('-').map(Number);
              setPestelUpdatedAt(`${y}年${m}月${d}日`);
            }
            setPestelLoadState('ready');
          })
          .catch(() => {
            if (!cancelled) setPestelLoadState('error');
          });
        return () => { cancelled = true; };
      }, []);

      const selectedProducts = PRODUCT_DATA.filter(p => selectedIds.includes(p.id))
        .sort((a, b) => (a.isMain === b.isMain ? 0 : a.isMain ? -1 : 1));

      const quadrantData = useMemo(() => {
        return selectedProducts.map(p => {
          const getValue = (key) => {
            if (key === 'priceNumeric') return p.priceNumeric;
            if (key === 'releaseTimestamp') return p.releaseTimestamp;
            return p.scores[key] || 0;
          };
          return { ...p, xVal: getValue(quadrantX), yVal: getValue(quadrantY) };

      const quadBounds = useMemo(() => {
        if (quadrantData.length === 0) return { xMin: 0, xMax: 10, yMin: 0, yMax: 10 };
        const getBounds = (key) => {
          if (key === 'priceNumeric') return { min: 4000, max: 35000 };
          if (key === 'releaseTimestamp') return { min: 2025, max: 2028 };
          return { min: 0, max: 10 };
        };
        const xB = getBounds(quadrantX);

        return {
          xBounds: xB,
          yBounds: yB

        const under10k = PRODUCT_DATA.filter((p) => p.priceNumeric < 10000).length;

        return {

                    <div className="pt-3 border-t border-slate-100">

            </section>

            <footer className="pt-2 border-t border-slate-200/80 text-xs sm:text-sm text-slate-500 flex flex-col md:flex-row items-start md:items-center justify-between gap-3">
              <p className="flex items-start gap-2 leading-relaxed">
                <svg className="w-4 h-4 text-slate-400 shrink-0 mt-0.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="12" cy="12" r="9" />

              <p className="kpi-value text-[11px] uppercase tracking-[0.16em] text-slate-400">Internal use only</p>
            </footer>
          </main>
