<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的精選相片集</title>
    <!-- 引入 Tailwind CSS 以進行快速且美觀的排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隱藏捲軸但保留捲動功能 (選用) */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937; 
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280; 
        }
        
        /* 圖片載入時的漸顯動畫 */
        .fade-in {
            animation: fadeIn 0.8s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans selection:bg-pink-500 selection:text-white">

    <!-- 頂部導覽列 / 標題 -->
    <header class="py-8 px-4 text-center border-b border-gray-800 bg-gray-900/80 backdrop-blur-md sticky top-0 z-40">
        <h1 class="text-3xl md:text-4xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-purple-500">
            精選相片集
        </h1>
        <p class="mt-2 text-gray-400 text-sm md:text-base">A Collection of Beautiful Moments</p>
    </header>

    <!-- 圖片畫廊區域 (使用 CSS Columns 達成瀑布流效果) -->
    <main class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
        <div id="gallery-container" class="columns-1 sm:columns-2 md:columns-3 lg:columns-4 gap-4 sm:gap-6 space-y-4 sm:space-y-6">
            <!-- 圖片將由 JavaScript 動態生成並插入於此 -->
        </div>
    </main>

    <!-- 頁尾 -->
    <footer class="py-6 text-center text-gray-500 text-sm border-t border-gray-800 mt-8">
        <p>&copy; 2026 My Photo Gallery. All rights reserved.</p>
    </footer>

    <!-- 燈箱 Modal (點擊圖片放大顯示) -->
    <div id="lightbox" class="fixed inset-0 z-50 hidden bg-black/95 backdrop-blur-sm flex justify-center items-center opacity-0 transition-opacity duration-300">
        <!-- 關閉按鈕 -->
        <button id="close-btn" class="absolute top-4 right-4 md:top-6 md:right-6 text-white hover:text-pink-400 transition-colors focus:outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        
        <!-- 放大圖片容器 -->
        <div class="relative max-w-[95vw] max-h-[95vh] p-2">
            <img id="lightbox-img" src="" alt="Enlarged view" class="max-w-full max-h-[90vh] object-contain rounded-md shadow-2xl mx-auto">
        </div>
    </div>

    <!-- JavaScript 邏輯 -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const galleryContainer = document.getElementById('gallery-container');
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const closeBtn = document.getElementById('close-btn');

            // 您的圖片檔案列表 (共 20 張)
            const images = [
                'y21.png', 'y22.png', 'y23.png', 'y24.png', 'y25.png',
                'y26.png', 'y27.png', 'y28.png', 'y29.png', 'y30.png',
                'y31.png', 'y32.png', 'y33.png', 'y34.png', 'y35.png',
                'y36.png', 'y37.png', 'y38.png', 'y39.png', 'y40.png'
            ];

            // 動態生成圖片 HTML 結構
            images.forEach((src, index) => {
                // 創建外層容器
                const itemDiv = document.createElement('div');
                itemDiv.className = 'break-inside-avoid relative group overflow-hidden rounded-xl shadow-lg bg-gray-800 fade-in cursor-zoom-in';
                // 錯開動畫時間，產生接續載入的視覺效果
                itemDiv.style.animationDelay = `${index * 0.1}s`;

                // 創建圖片元素
                const img = document.createElement('img');
                img.src = src;
                img.alt = `Gallery Image ${index + 1}`;
                img.className = 'w-full h-auto object-cover transform transition-transform duration-500 group-hover:scale-105 group-hover:brightness-110';
                img.loading = 'lazy'; // 延遲載入以提升效能

                // 創建懸浮遮罩層 (選用，增加質感)
                const overlay = document.createElement('div');
                overlay.className = 'absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none flex items-end justify-center pb-4';
                
                // 點擊事件：開啟燈箱
                itemDiv.addEventListener('click', () => openLightbox(src));

                // 將元素組裝起來
                itemDiv.appendChild(img);
                itemDiv.appendChild(overlay);
                galleryContainer.appendChild(itemDiv);
            });

            // 開啟燈箱功能
            function openLightbox(imageSrc) {
                lightboxImg.src = imageSrc;
                lightbox.classList.remove('hidden');
                // 延遲一點點時間再改變透明度，以觸發 CSS 轉場效果
                setTimeout(() => {
                    lightbox.classList.remove('opacity-0');
                    lightbox.classList.add('opacity-100');
                }, 10);
                document.body.style.overflow = 'hidden'; // 防止背景滾動
            }

            // 關閉燈箱功能
            function closeLightbox() {
                lightbox.classList.remove('opacity-100');
                lightbox.classList.add('opacity-0');
                // 等待轉場動畫結束後再隱藏元素
                setTimeout(() => {
                    lightbox.classList.add('hidden');
                    lightboxImg.src = '';
                }, 300);
                document.body.style.overflow = 'auto'; // 恢復背景滾動
            }

            // 綁定關閉事件
            closeBtn.addEventListener('click', closeLightbox);
            
            // 點擊燈箱背景也能關閉
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox || e.target.parentElement === lightbox) {
                    closeLightbox();
                }
            });

            // 支援使用 ESC 鍵關閉燈箱
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && !lightbox.classList.contains('hidden')) {
                    closeLightbox();
                }
            });
        });
    </script>
</body>
</html>
