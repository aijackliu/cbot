        const STOCK_NAMES = {
            "2330.TW": "台積電",
            "2317.TW": "鴻海",
            "2454.TW": "聯發科",
            "0050.TW": "元大台灣50",
            "005930.KS": "三星電子",
            "000660.KS": "SK海力士",
            "NVDA": "輝達",
            "GOOGL": "谷歌",
            "INTC": "英特爾",
            "MU": "美光",
            "^TWII": "台指期(大盤)",
            "2348.TW": "海悅",
            "3450.TW": "聯鈞",
            "8234.TWO": "新漢",
            "2303.TW": "聯電",
            "2344.TW": "華邦電",
            "3481.TW": "群創",
            "00981A.TW": "元大日本龍頭"
        };

        let currentFilter = 'all';

        // 輔助獲取市場類型
        function getMarketClass(code) {
            if (code.endsWith('.TW') || code.endsWith('.TWO')) return 'tw';
            if (code.endsWith('.KS')) return 'ks';
            return 'us';
        }

        function getMarketName(code) {
            const market = getMarketClass(code);
            if (market === 'tw') return '台股';
            if (market === 'ks') return '韓股';
            return '美股';
        }

        // Markdown 簡單格式化（將 ** 替換成 strong，替換換行符號）
        function formatMarkdown(text) {
            if (!text) return "";
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        // 解析 AI 分析內容以分段展示
        function parseAnalysis(analysisText) {
            let tech = "暫無趨勢分析";
            let volume = "暫無量價分析";
            let advice = "暫無操作建議";

            if (!analysisText || analysisText.startsWith("AI 分析失敗")) {
                return { tech: analysisText || "無數據", volume: analysisText || "無數據", advice: analysisText || "無數據" };
            }

            // 尋找各個分點段落，考慮換行符與可選冒號，並支援 **1. 標題 格式
            const regexes = [
                /(?:^|[\r\n])(?:\*\*)?(?:1[\.、]|Part\s*1|技術指標)[^\r\n]*?[\：\:]?([\s\S]*?)(?=(?:^|[\r\n])(?:\*\*)?(?:2[\.、]|Part\s*2|量價關係|$))/i,
                /(?:^|[\r\n])(?:\*\*)?(?:2[\.、]|Part\s*2|量價關係)[^\r\n]*?[\：\:]?([\s\S]*?)(?=(?:^|[\r\n])(?:\*\*)?(?:3[\.、]|Part\s*3|短期預測|短期走勢|建議|$))/i,
                /(?:^|[\r\n])(?:\*\*)?(?:3[\.、]|Part\s*3|短期預測|短期走勢|建議)[^\r\n]*?[\：\:]?([\s\S]*)/i
            ];

            const m1 = analysisText.match(regexes[0]);
            const m2 = analysisText.match(regexes[1]);
            const m3 = analysisText.match(regexes[2]);

            if (m1) tech = m1[1].replace(/[\#\*]/g, '').trim();
            if (m2) volume = m2[1].replace(/[\#\*]/g, '').trim();
            if (m3) advice = m3[1].replace(/[\#\*]/g, '').trim();

            // 如果正則失敗，直接使用備份段落劃分
            if (tech === "暫無趨勢分析" && volume === "暫無量價分析") {
                const parts = analysisText.split(/(?:^|[\r\n])(?:\*\*)?(?:2[\.、]|3[\.、])(?:\*\*)?/);
                if (parts.length >= 1) tech = parts[0].replace(/^(?:\*\*)?1[\.、]/, '').replace(/[\#\*]/g, '').trim();
                if (parts.length >= 2) volume = parts[1].replace(/[\#\*]/g, '').trim();
                if (parts.length >= 3) advice = parts[2].replace(/[\#\*]/g, '').trim();
            }

            return { 
                tech: formatMarkdown(tech), 
                volume: formatMarkdown(volume), 
                advice: formatMarkdown(advice) 
            };
        }

        // 篩選市場
        function filterMarket(market) {
            currentFilter = market;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderGrid();
        }

        // 渲染卡片
        function renderGrid() {
            const grid = document.getElementById('stock-grid');
            grid.innerHTML = '';

            const stocks = reportData.stocks;

            Object.keys(stocks).forEach(code => {
                const stock = stocks[code];
                const market = getMarketClass(code);
                const name = STOCK_NAMES[code] || code;

                // 篩選過濾
                if (currentFilter !== 'all' && currentFilter !== market) return;

                const card = document.createElement('div');
                card.className = `stock-card`;

                const changeClass = stock.pct_chg > 0 ? 'up' : (stock.pct_chg < 0 ? 'down' : 'flat');
                const changeSign = stock.pct_chg > 0 ? '+' : '';
                const parsed = parseAnalysis(stock.analysis);

                card.innerHTML = `
                    <div>
                        <div class="card-header">
                            <div class="stock-info">
                                <h2>${name} <span class="market-tag ${market}">${getMarketName(code)}</span></h2>
                                <div class="code">${code}</div>
                            </div>
                        </div>

                        <div class="price-section">
                            <div class="price">${stock.current_price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                            <div class="change-tag ${changeClass}">
                                ${stock.pct_chg !== undefined ? `${changeSign}${stock.pct_chg.toFixed(2)}%` : '-'}
                            </div>
                        </div>
                    </div>

                    <div class="analysis-container">
                        ${stock.success ? `
                            <div class="analysis-block tech">
                                <div class="analysis-title">
                                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18L9 11.25l4.306 4.307a11.95 11.95 0 015.814-5.519l2.74-1.22m0 0l-5.94-2.281m5.94 2.28l-2.28 5.941"></path></svg>
                                    技術分析與價格趨勢
                                </div>
                                <div class="analysis-content">${parsed.tech}</div>
                            </div>
                            <div class="analysis-block volume">
                                <div class="analysis-title">
                                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6a7.5 7.5 0 107.5 7.5h-7.5V6z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5H21A7.5 7.5 0 0013.5 3v7.5z"></path></svg>
                                    量價關係與市場情緒
                                </div>
                                <div class="analysis-content">${parsed.volume}</div>
                            </div>
                            <div class="analysis-block advice">
                                <div class="analysis-title">
                                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                                    短期預測與操作建議
                                </div>
                                <div class="analysis-content">${parsed.advice}</div>
                            </div>
                        ` : `
                            <div class="error-message">
                                📊 分析載入失敗：${stock.error || '未知錯誤'}
                            </div>
                        `}
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        // 初始化
        document.getElementById('last-updated-time').innerText = reportData.last_updated;
        renderGrid();
    </script>
